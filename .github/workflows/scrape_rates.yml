name: Scrape Hotel Rates

on:
  # Esegue ogni 6 ore: mezzanotte, 06:00, 12:00, 18:00 UTC
  schedule:
    - cron: "0 0,6,12,18 * * *"
  # Permette l'avvio manuale dalla tab "Actions" di GitHub
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Quante notti future scansionare (default: 7)"
        required: false
        default: "7"

jobs:
  scrape:
    name: Scrape & Alert
    runs-on: ubuntu-latest
    timeout-minutes: 60   # sicurezza: interrompe se gira troppo a lungo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-scraper.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements-scraper.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fix stale migration stamp
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend
        run: python scripts/fix_db_state.py

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend
        run: alembic upgrade head

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
          SCRAPE_DAYS_AHEAD: ${{ github.event.inputs.days_ahead || '7' }}
        run: python backend/scripts/scrape_all.py
