name: Scrape Hotel Rates

on:
  # Esegue una volta al giorno alle 06:00 UTC (~180 crediti/mese con 3 giorni default)
  schedule:
    - cron: "0 6 * * *"
  # Permette l'avvio manuale dalla tab "Actions" di GitHub
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Quante notti future scansionare (default: 3)"
        required: false
        default: "3"

jobs:
  scrape:
    name: Scrape & Alert
    runs-on: ubuntu-latest
    timeout-minutes: 60   # sicurezza: interrompe se gira troppo a lungo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-scraper.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements-scraper.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Fix stale migration stamp
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend
        run: python scripts/fix_db_state.py

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend
        run: alembic upgrade head

      - name: Diagnostica DB (hotel e slug)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python - <<'PYEOF'
          import asyncio, os, sys
          from pathlib import Path
          sys.path.insert(0, str(Path("backend").resolve()))
          url = os.environ["DATABASE_URL"]
          if url.startswith("postgres://"):
              url = url.replace("postgres://", "postgresql+asyncpg://", 1)
          elif url.startswith("postgresql://") and "+asyncpg" not in url:
              url = url.replace("postgresql://", "postgresql+asyncpg://", 1)
          url = url.replace("sslmode=require", "ssl=require")
          from sqlalchemy.ext.asyncio import create_async_engine, AsyncSession
          from sqlalchemy.orm import sessionmaker
          from sqlalchemy import select
          async def run():
              engine = create_async_engine(url, pool_pre_ping=True)
              Session = sessionmaker(engine, class_=AsyncSession, expire_on_commit=False)
              from app.models.hotel import Hotel, HotelCompetitor
              async with Session() as db:
                  hotels = (await db.execute(select(Hotel))).scalars().all()
                  print(f"Hotel nel DB: {len(hotels)}")
                  for h in hotels:
                      print(f"  [{h.id}] '{h.name}' booking_key={h.booking_key!r}")
                      comps = (await db.execute(
                          select(HotelCompetitor).where(HotelCompetitor.hotel_id == h.id)
                      )).scalars().all()
                      for c in comps:
                          print(f"    competitor '{c.competitor_name}' key={c.competitor_booking_key!r} active={c.is_active}")
              await engine.dispose()
          asyncio.run(run())
          PYEOF

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
          SCRAPE_DAYS_AHEAD: ${{ github.event.inputs.days_ahead || '3' }}
        run: python backend/scripts/scrape_all.py

      - name: Upload debug HTML (se nessun prezzo trovato)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-debug-html
          path: backend/app/services/_debug_*.html
          if-no-files-found: ignore
          retention-days: 3
