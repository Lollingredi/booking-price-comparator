name: Scrape Hotel Rates

on:
  # Esegue ogni 6 ore: mezzanotte, 06:00, 12:00, 18:00 UTC
  schedule:
    - cron: "0 0,6,12,18 * * *"
  # Permette l'avvio manuale dalla tab "Actions" di GitHub
  workflow_dispatch:
    inputs:
      days_ahead:
        description: "Quante notti future scansionare (default: 7)"
        required: false
        default: "7"

jobs:
  scrape:
    name: Scrape & Alert
    runs-on: ubuntu-latest
    timeout-minutes: 60   # sicurezza: interrompe se gira troppo a lungo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-scraper.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements-scraper.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run database migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        working-directory: backend
        run: |
          # Run migrations; if tables already exist without alembic tracking
          # (DuplicateTableError), stamp the current revision and retry.
          OUTPUT=$(alembic upgrade head 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "DuplicateTableError\|already exists"; then
              echo "Tables exist but not tracked by Alembic. Stamping 001 and retrying..."
              alembic stamp 001
              alembic upgrade head
            else
              exit $EXIT_CODE
            fi
          fi

      - name: Run scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SCRAPER_PROXY: ${{ secrets.SCRAPER_PROXY }}
          SCRAPE_DAYS_AHEAD: ${{ github.event.inputs.days_ahead || '7' }}
        run: python backend/scripts/scrape_all.py
