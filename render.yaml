services:
  - type: web
    name: ratescope-api
    runtime: python
    rootDir: backend
    buildCommand: pip install --upgrade --no-cache-dir -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free             # scraping delegato a GitHub Actions — nessun Playwright sul server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ratescope-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"   # accetta tutti i domini; restringe con "https://tuoapp.vercel.app" in produzione
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: RATE_PROVIDER
        value: booking
      - key: SCRAPER_PROXY
        value: ""
    healthCheckPath: /health

databases:
  - name: ratescope-db
    databaseName: ratescope
    plan: free
