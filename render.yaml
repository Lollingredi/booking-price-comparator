services:
  - type: web
    name: ratescope-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: starter          # free tier non supporta Playwright; usa almeno "starter"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ratescope-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://your-vercel-app.vercel.app   # <-- sostituisci con il tuo URL Vercel
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: RATE_PROVIDER
        value: booking
      - key: REDIS_URL
        value: ""          # lascia vuoto se non usi Celery in produzione
      - key: SCRAPER_PROXY
        value: ""
    healthCheckPath: /health

databases:
  - name: ratescope-db
    databaseName: ratescope
    plan: free
